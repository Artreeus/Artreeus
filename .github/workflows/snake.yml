# Generates the contribution-snake SVGs used in the README.
# Place this file at: .github/workflows/snake.yml
name: Generate Snake Animation
 
on:
  schedule:
    # Runs once a day at midnight UTC
    - cron: "0 0 * * *"
  # Lets you run it manually from the Actions tab
  workflow_dispatch:
  # Also runs on every push to the default branch
  push:
    branches:
      - main
 
permissions:
  contents: write
 
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
